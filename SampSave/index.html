<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SampSave - Almacenamiento Permanente</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #121212; --card-bg: #1e1e1e; --accent: #2ecc71;
            --text-main: #ffffff; --text-dim: #b3b3b3; --danger: #e74c3c; --blue: #3498db;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-dark); color: var(--text-main); margin: 0; display: flex; flex-direction: column; align-items: center; }
        nav { width: 100%; max-width: 600px; display: flex; justify-content: space-around; padding: 20px 0; border-bottom: 1px solid #333; }
        nav i { font-size: 24px; cursor: pointer; color: var(--text-dim); transition: 0.3s; }
        nav i:hover { color: white; }

        section { width: 90%; max-width: 600px; padding: 20px 0; display: none; }
        .active { display: block; }

        /* BOTÓN SHINY */
        .btn-shiny {
            position: relative; display: inline-block; padding: 15px 30px; margin-top: 25px;
            background: #222; color: white; text-decoration: none; font-weight: bold;
            border: 2px solid #444; overflow: hidden; transition: 0.5s; cursor: pointer; border-radius: 4px;
        }
        .btn-shiny:hover { background: var(--blue); box-shadow: 0 0 20px var(--blue); }
        .btn-shiny::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent); transition: 0.5s; }
        .btn-shiny:hover::before { left: 100%; }

        /* UI ELEMENTS */
        .project-card { background: var(--card-bg); padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-radius: 8px; border-left: 4px solid var(--accent); }
        .upload-area { border: 2px dashed #444; padding: 40px; text-align: center; border-radius: 10px; margin-bottom: 20px; cursor: pointer; }
        input[type="text"], textarea { width: 100%; padding: 12px; background: #222; border: 1px solid #444; color: white; box-sizing: border-box; border-radius: 5px; margin-bottom: 10px; }
        button { padding: 12px; border-radius: 5px; border: none; background: #333; color: white; cursor: pointer; font-weight: bold; }
        #btn-guardar:disabled { opacity: 0.5; }

        .main-player-unit { background: #282828; padding: 20px; border-radius: 10px; margin: 10px 0; border: 2px solid transparent; }
        .playing-old { border-color: var(--blue); background: #1a2633; }
        audio { width: 100%; filter: invert(100%) hue-rotate(180deg); margin-top: 10px; }
        
        .version-item { background: #1a1a1a; padding: 12px; margin-top: 10px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; }
        .tag { padding: 3px 8px; border-radius: 4px; font-weight: bold; font-size: 0.75rem; }
        .tag-current { background: var(--accent); color: black; }
        .tag-old { background: var(--blue); color: white; }
    </style>
</head>
<body>

    <nav id="top-nav">
        <i class="fas fa-home" onclick="navTo('home')"></i>
        <i class="fas fa-plus" onclick="initNewProject()"></i>
        <i class="fas fa-book" onclick="navTo('library')"></i>
    </nav>

    <section id="home" class="active">
        <div style="text-align: center;">
            <h1>SampSave 💎</h1>
            <p style="color: var(--text-dim);">Tus audios ahora se guardan de forma permanente en la base de datos de tu navegador.</p>
            <a href="https://github.com/guille-gga/SampSave" target="_blank" class="btn-shiny">¿COMO USAR?</a>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 30px;">
                <button onclick="navTo('library')">LIBRERÍA</button>
                <button onclick="initNewProject()" style="background: var(--accent);">NUEVO TRACK</button>
            </div>
        </div>
    </section>

    <section id="library">
        <h2>LIBRERÍA</h2>
        <div id="project-list"></div>
    </section>

    <section id="add-audio">
        <h2 id="upload-header">Subir</h2>
        <div class="upload-area" onclick="document.getElementById('file-input').click()">
            <i class="fas fa-save" style="font-size: 40px; color: var(--accent);"></i>
            <p id="file-status">Elegir archivo para guardar en BD</p>
            <input type="file" id="file-input" hidden accept=".mp3,.wav" onchange="fileSelected()">
        </div>
        <input type="text" id="proj-name" placeholder="Nombre de la canción">
        <input type="text" id="proj-version" placeholder="Nombre versión (Ej: Mezcla Final)">
        <button id="btn-guardar" disabled onclick="saveProject()" style="width: 100%;">GUARDAR EN DISCO LOCAL</button>
    </section>

    <section id="project-details">
        <h2 id="detail-title">Cargando...</h2>
        <div id="player-unit" class="main-player-unit">
            <span id="player-mode-tag" class="tag tag-current">ACTUAL</span>
            <strong id="player-version-name" style="margin-left: 10px;">-</strong>
            <audio id="audio-element" controls></audio>
        </div>
        <div style="display: flex; gap: 10px; margin-top: 15px;">
            <button onclick="prepareUpdate()" style="flex: 2; background: var(--blue);"><i class="fas fa-sync"></i> NUEVA VERSIÓN</button>
            <button onclick="deleteProject()" style="background: var(--danger);"><i class="fas fa-trash"></i></button>
        </div>
        <textarea id="proj-notes" placeholder="Notas del track..."></textarea>
        <div id="history-list"></div>
    </section>

    <script>
        let dbIDB;
        let projects = [];
        let currentIdx = null;

        // 1. INICIALIZAR INDEXEDDB (Base de datos real)
        const request = indexedDB.open("SampSaveStorage", 1);
        request.onupgradeneeded = e => {
            dbIDB = e.target.result;
            dbIDB.createObjectStore("files", { keyPath: "id" });
        };
        request.onsuccess = e => {
            dbIDB = e.target.result;
            loadProjects();
        };

        function navTo(id) {
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'library') renderLibrary();
        }

        function fileSelected() {
            const file = document.getElementById('file-input').files[0];
            if(file) {
                document.getElementById('file-status').innerText = "Seleccionado: " + file.name;
                document.getElementById('btn-guardar').disabled = false;
            }
        }

        // 2. GUARDAR EL AUDIO COMO BINARIO
        async function saveProject() {
            const file = document.getElementById('file-input').files[0];
            const vName = document.getElementById('proj-version').value;
            if(!file || !vName) return;

            const fileID = Date.now().toString();
            const transaction = dbIDB.transaction(["files"], "readwrite");
            transaction.objectStore("files").add({ id: fileID, data: file });

            const audioMeta = { vName: vName, fName: file.name, fileID: fileID };

            if(document.getElementById('upload-header').innerText === "Nueva Versión") {
                projects[currentIdx].history.unshift(projects[currentIdx].current);
                projects[currentIdx].current = audioMeta;
            } else {
                projects.push({
                    name: document.getElementById('proj-name').value || "Sin título",
                    current: audioMeta,
                    history: [],
                    notes: ""
                });
            }
            saveConfig();
            navTo('library');
        }

        function saveConfig() {
            localStorage.setItem('sampsave_meta', JSON.stringify(projects));
        }

        function loadProjects() {
            projects = JSON.parse(localStorage.getItem('sampsave_meta')) || [];
            renderLibrary();
        }

        function renderLibrary() {
            const container = document.getElementById('project-list');
            container.innerHTML = projects.map((p, i) => `
                <div class="project-card">
                    <div><strong>${p.name}</strong><br><small>${p.current.vName}</small></div>
                    <button onclick="openProject(${i})">ABRIR</button>
                </div>
            `).join('');
        }

        async function openProject(i) {
            currentIdx = i;
            const p = projects[i];
            document.getElementById('detail-title').innerText = p.name;
            document.getElementById('proj-notes').value = p.notes;
            await playAudio(p.current, true);
            renderHistory();
            navTo('project-details');
        }

        // 3. RECUPERAR EL AUDIO DE LA BD AL HACER CLICK
        async function playAudio(audioMeta, isCurrent) {
            const transaction = dbIDB.transaction(["files"], "readonly");
            const store = transaction.objectStore("files");
            const request = store.get(audioMeta.fileID);

            request.onsuccess = () => {
                const fileBlob = request.result.data;
                const url = URL.createObjectURL(fileBlob);
                const player = document.getElementById('audio-element');
                player.src = url;
                document.getElementById('player-version-name').innerText = audioMeta.vName;
                document.getElementById('player-mode-tag').className = isCurrent ? "tag tag-current" : "tag tag-old";
                document.getElementById('player-mode-tag').innerText = isCurrent ? "ACTUAL" : "VERSIÓN ANTIGUA";
                document.getElementById('player-unit').classList.toggle('playing-old', !isCurrent);
                player.play();
            };
        }

        function renderHistory() {
            const container = document.getElementById('history-list');
            const history = projects[currentIdx].history;
            container.innerHTML = "<h3>HISTORIAL</h3>" + (history.length ? history.map((h, i) => `
                <div class="version-item">
                    <span>${h.vName}</span>
                    <button onclick='playAudio(${JSON.stringify(h)}, false)'><i class="fas fa-play"></i></button>
                </div>
            `).join('') : "<p>Sin versiones</p>");
        }

        function initNewProject() {
            document.getElementById('upload-header').innerText = "Nuevo Proyecto";
            document.getElementById('proj-name').style.display = "block";
            navTo('add-audio');
        }

        function prepareUpdate() {
            document.getElementById('upload-header').innerText = "Nueva Versión";
            document.getElementById('proj-name').style.display = "none";
            navTo('add-audio');
        }

        function deleteProject() {
            if(confirm("¿Borrar proyecto?")) {
                projects.splice(currentIdx, 1);
                saveConfig();
                navTo('library');
            }
        }

        document.getElementById('proj-notes').oninput = e => {
            projects[currentIdx].notes = e.target.value;
            saveConfig();
        };
    </script>
</body>
</html>
